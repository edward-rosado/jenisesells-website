name: Platform

on:
  push:
    branches: [feat/platform-onboarding]
    paths:
      - 'apps/platform/**'
      - '.github/workflows/platform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/platform/**'
      - '.github/workflows/platform.yml'

jobs:
  lint-test-coverage:
    name: "Platform — lint, test, coverage"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/platform/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/platform

      - name: Lint
        run: npm run lint --prefix apps/platform

      - name: Build
        run: npm run build --prefix apps/platform

      - name: Test with coverage
        run: npm run test:coverage --prefix apps/platform

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: platform-coverage
          path: apps/platform/coverage/
          retention-days: 7
