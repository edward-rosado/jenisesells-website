name: Deploy Agent Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - '.github/workflows/deploy-agent-site.yml'

jobs:
  test:
    name: "Agent Site — lint, test, build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/agent-site/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/agent-site

      - name: Lint
        run: npm run lint --prefix apps/agent-site

      - name: Test with coverage
        run: npm run test:coverage --prefix apps/agent-site

      - name: Build
        run: npm run build --prefix apps/agent-site

  deploy:
    name: "Deploy to Cloudflare Pages"
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/agent-site/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/agent-site

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npm run build --prefix apps/agent-site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/agent-site/.next --project-name=real-estate-star-agents
