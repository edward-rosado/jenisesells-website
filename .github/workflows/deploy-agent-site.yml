name: Deploy Agent Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - 'config/accounts/**'
      - 'packages/**'
      - '.github/workflows/deploy-agent-site.yml'

jobs:
  test:
    name: "Agent Site -- lint, test, build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate config registry
        run: node apps/agent-site/scripts/generate-config-registry.mjs

      - name: Lint
        run: npm run lint --prefix apps/agent-site

      - name: Test with coverage
        run: npm run test:coverage --prefix apps/agent-site

      - name: Build Next.js (smoke test)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run build --prefix apps/agent-site

  deploy:
    name: "Deploy to Cloudflare Workers"
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate config registry
        run: node apps/agent-site/scripts/generate-config-registry.mjs

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run build --prefix apps/agent-site

      - name: Build for Cloudflare (OpenNext)
        working-directory: apps/agent-site
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/agent-site
          command: deploy

      # OpenNext intercepts `wrangler deploy` so the wrangler-action secrets:
      # parameter never runs `wrangler secret put`. Set secrets explicitly.
      - name: Set Cloudflare Worker secrets
        working-directory: apps/agent-site
        run: |
          printf '%s\n' "$WORKER_SECRETS" | npx wrangler secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_SECRETS: |
            {
              "TURNSTILE_SECRET_KEY": "${{ secrets.TURNSTILE_SECRET_KEY }}",
              "LEAD_API_KEY": "${{ secrets.LEAD_API_KEY }}",
              "LEAD_HMAC_SECRET": "${{ secrets.LEAD_HMAC_SECRET }}",
              "LEAD_API_URL": "${{ secrets.LEAD_API_URL }}"
            }
