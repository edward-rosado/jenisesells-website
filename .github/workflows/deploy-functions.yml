name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/RealEstateStar.Functions/**'
      - 'apps/api/RealEstateStar.Domain/**'
      - 'apps/api/RealEstateStar.DataServices/**'
      - 'apps/api/RealEstateStar.Data/**'
      - 'apps/api/RealEstateStar.Workers/**'
      - 'apps/api/RealEstateStar.Services/**'
      - 'apps/api/RealEstateStar.Activities/**'
      - 'apps/api/RealEstateStar.Clients/**'
      - '.github/workflows/deploy-functions.yml'

env:
  FUNCTION_APP_NAME: real-estate-star-functions-v2
  RESOURCE_GROUP: real-estate-star-rg

jobs:
  build-and-test:
    name: "Functions — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9 + 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj --no-restore --configuration Release --framework net9.0

      - name: Publish
        run: >
          dotnet publish apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj
          --no-build
          --configuration Release
          --framework net9.0
          --output ./publish/functions

      - uses: actions/upload-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

  deploy:
    name: "Deploy to Azure Functions"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare deployment package
        run: |
          set -euo pipefail

          # Flex Consumption requires .azurefunctions/ for deployment validation.
          # Worker-side indexing (workerIndexing: true) handles function discovery at runtime.
          # We provide ONLY extensions.json — no per-function metadata files.
          rm -rf ./publish/functions/.azurefunctions
          mkdir -p ./publish/functions/.azurefunctions
          echo '{"extensions":[]}' > ./publish/functions/.azurefunctions/extensions.json

          echo "=== .azurefunctions ==="
          ls -la ./publish/functions/.azurefunctions/
          echo "=== worker.config.json ==="
          cat ./publish/functions/worker.config.json 2>/dev/null || echo "Not found"
          echo "=== host.json ==="
          cat ./publish/functions/host.json 2>/dev/null || echo "Not found"

      - name: Create deployment package
        run: |
          cd ./publish/functions
          zip -r ../../functions.zip . -x '*.pdb'

      - name: Deploy to Azure Functions (Flex Consumption)
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --src functions.zip \
            --timeout 300

      - name: Verify deployment
        run: |
          echo "Checking function app status..."
          az resource show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-type "Microsoft.Web/sites" \
            --query "{state: properties.state, hostName: properties.defaultHostName}" \
            --output table
