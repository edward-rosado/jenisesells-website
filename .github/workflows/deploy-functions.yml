name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/RealEstateStar.Functions/**'
      - 'apps/api/RealEstateStar.Domain/**'
      - 'apps/api/RealEstateStar.DataServices/**'
      - 'apps/api/RealEstateStar.Data/**'
      - 'apps/api/RealEstateStar.Workers/**'
      - 'apps/api/RealEstateStar.Services/**'
      - 'apps/api/RealEstateStar.Activities/**'
      - 'apps/api/RealEstateStar.Clients/**'
      - '.github/workflows/deploy-functions.yml'

env:
  FUNCTION_APP_NAME: real-estate-star-functions-v3
  RESOURCE_GROUP: real-estate-star-rg
  FUNCTIONS_PROJECT: apps/api/RealEstateStar.Functions

jobs:
  build-and-deploy:
    name: "Functions — build and deploy"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure app settings
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Site content KV namespace (written by PersistSiteContentFunction, read by agent-site Worker)
          SETTINGS=("SiteContent__KvNamespaceId=68e52e8dabb7499681734c8f2dac5f5a")
          [ -n "$CF_ACCOUNT_ID" ] && SETTINGS+=("Cloudflare__AccountId=$CF_ACCOUNT_ID")
          [ -n "$CF_TOKEN" ]      && SETTINGS+=("Cloudflare__ApiToken=$CF_TOKEN")
          if [ ${#SETTINGS[@]} -gt 0 ]; then
            az functionapp config appsettings set \
              --name "$FUNCTION_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --settings "${SETTINGS[@]}" \
              --output none
            echo "Applied ${#SETTINGS[@]} app settings"
          fi

      - name: Build and deploy
        run: |
          cd ${{ env.FUNCTIONS_PROJECT }}

          # Build — this generates WorkerExtensions, functions.metadata, worker.config.json
          dotnet build --configuration Release --framework net9.0

          # func start builds to bin/output/ with the exact structure Azure needs.
          # We can't run func start in CI, but we can replicate what it does:
          # 1. dotnet publish to bin/output
          # 2. Copy SDK metadata files from obj/
          # 3. Copy WorkerExtensions to .azurefunctions/

          # Step 1: Publish to bin/output (same path func start uses)
          dotnet publish --configuration Release --framework net9.0 --no-build --output ./bin/output

          # Step 2: Copy SDK-generated metadata
          OBJ_DIR=obj/Release/net9.0
          cp "$OBJ_DIR/functions.metadata" ./bin/output/
          cp "$OBJ_DIR/worker.config.json" ./bin/output/
          echo "functions.metadata: $(wc -l < ./bin/output/functions.metadata) lines"
          cat ./bin/output/worker.config.json

          # Step 3: Copy WorkerExtensions to .azurefunctions/
          EXTENSIONS_DIR=$(find obj -path "*/WorkerExtensions/bin/Release/net8.0" -type d | head -1)
          echo "Extensions source: $EXTENSIONS_DIR"
          cp -r "$EXTENSIONS_DIR/." ./bin/output/.azurefunctions/
          # Flatten function.deps.json from bin/ subdirectory to root
          DEPS_FILE=$(find ./bin/output/.azurefunctions -name "function.deps.json" | head -1)
          [ -n "$DEPS_FILE" ] && cp "$DEPS_FILE" ./bin/output/.azurefunctions/function.deps.json 2>/dev/null || true

          # Step 4: Copy agent config files (repo root, outside Docker build context)
          # Program.cs checks ContentRootPath/config/accounts/ first (Docker), falls back to ../../..
          # On Azure Functions, ContentRootPath IS the deployment dir, so config must be inside it.
          cp -r ../../../config ./bin/output/config
          echo "Agent configs: $(ls ./bin/output/config/accounts/ 2>/dev/null | wc -l) accounts"

          # Verify
          echo "=== bin/output structure ==="
          echo "DLLs: $(ls ./bin/output/*.dll | wc -l)"
          echo ".azurefunctions DLLs: $(ls ./bin/output/.azurefunctions/*.dll 2>/dev/null | wc -l)"
          echo "runtimes: $(find ./bin/output/.azurefunctions/runtimes -type f 2>/dev/null | wc -l)"
          for f in functions.metadata worker.config.json host.json RealEstateStar.Functions.dll .azurefunctions/function.deps.json; do
            [ -f "./bin/output/$f" ] && echo "OK: $f" || echo "MISSING: $f"
          done

          # Create local.settings.json for func CLI
          echo '{"IsEncrypted":false,"Values":{"FUNCTIONS_WORKER_RUNTIME":"dotnet-isolated"}}' > ./bin/output/local.settings.json

          # Deploy from bin/output — same dir structure func start uses
          cd bin/output
          func azure functionapp publish ${{ env.FUNCTION_APP_NAME }} --no-build --dotnet-isolated

      - name: Verify deployment
        run: |
          sleep 45
          echo "Checking function discovery..."
          FUNCS=$(az rest --method get \
            --url "https://management.azure.com/subscriptions/ca48f899-f7bf-4856-bf2a-3618deeaf010/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.FUNCTION_APP_NAME }}/functions?api-version=2023-12-01" \
            --query "value | length(@)" --output tsv 2>/dev/null || echo "0")
          echo "Functions discovered: $FUNCS"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.FUNCTION_APP_NAME }}.azurewebsites.net/api/health" || echo "000")
          echo "Health endpoint: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Deployment verified successfully!"
          else
            echo "WARNING: Health check returned $HTTP_CODE (may need cold start time)"
          fi
