name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/RealEstateStar.Functions/**'
      - 'apps/api/RealEstateStar.Domain/**'
      - 'apps/api/RealEstateStar.DataServices/**'
      - 'apps/api/RealEstateStar.Data/**'
      - 'apps/api/RealEstateStar.Workers/**'
      - 'apps/api/RealEstateStar.Services/**'
      - 'apps/api/RealEstateStar.Activities/**'
      - 'apps/api/RealEstateStar.Clients/**'
      - '.github/workflows/deploy-functions.yml'

env:
  FUNCTION_APP_NAME: real-estate-star-functions
  RESOURCE_GROUP: real-estate-star-rg

jobs:
  build-and-test:
    name: "Functions — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj --no-restore --configuration Release

      - name: Publish
        run: >
          dotnet publish apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj
          --no-build
          --configuration Release
          --output ./publish/functions

      - uses: actions/upload-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

  deploy:
    name: "Deploy to Azure Functions"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Generate function metadata
        run: |
          # The Microsoft.Azure.Functions.Worker.Sdk 2.x source generator is supposed to
          # produce the .azurefunctions/ directory during `dotnet publish`, but it does not
          # work reliably with .NET 10 preview. We generate the metadata manually here.
          #
          # Flex Consumption requires one JSON file per function under .azurefunctions/,
          # plus extensions.json listing the Durable Task extension.
          # Format reference: https://learn.microsoft.com/azure/azure-functions/flex-consumption-plan

          set -euo pipefail
          OUTDIR="./publish/functions/.azurefunctions"
          DLL="RealEstateStar.Functions.dll"
          mkdir -p "$OUTDIR"

          write_fn() {
            local name="$1"
            local entry="$2"
            local bindings="$3"
            cat > "$OUTDIR/${name}.json" <<JSON
          {
            "name": "${name}",
            "scriptFile": "${DLL}",
            "entryPoint": "${entry}",
            "language": "dotnet-isolated",
            "properties": { "IsCodeless": false, "IsDisabled": false },
            "bindings": ${bindings}
          }
          JSON
          }

          # ── Queue triggers (also carry DurableClient input binding) ─────────────

          write_fn "StartActivation" \
            "RealEstateStar.Functions.Activation.StartActivationFunction.RunAsync" \
            '[
              { "name": "request", "type": "queueTrigger", "direction": "In", "queueName": "activation-requests", "connection": "AzureWebJobsStorage" },
              { "name": "client", "type": "durableClient", "direction": "In" }
            ]'

          write_fn "StartLeadProcessing" \
            "RealEstateStar.Functions.Lead.StartLeadProcessingFunction.RunAsync" \
            '[
              { "name": "message", "type": "queueTrigger", "direction": "In", "queueName": "lead-requests", "connection": "AzureWebJobsStorage" },
              { "name": "client", "type": "durableClient", "direction": "In" }
            ]'

          write_fn "ProcessWhatsAppWebhook" \
            "RealEstateStar.Functions.WhatsApp.ProcessWebhookFunction.RunAsync" \
            '[
              { "name": "messageBody", "type": "queueTrigger", "direction": "In", "queueName": "whatsapp-webhooks", "connection": "AzureWebJobsStorage" }
            ]'

          # ── Timer trigger ────────────────────────────────────────────────────────

          write_fn "WhatsAppRetry" \
            "RealEstateStar.Functions.WhatsApp.WhatsAppRetryFunction.RunAsync" \
            '[
              { "name": "timer", "type": "timerTrigger", "direction": "In", "schedule": "0 */30 * * * *" }
            ]'

          # ── Orchestration triggers ───────────────────────────────────────────────

          write_fn "ActivationOrchestrator" \
            "RealEstateStar.Functions.Activation.ActivationOrchestratorFunction.RunAsync" \
            '[
              { "name": "ctx", "type": "orchestrationTrigger", "direction": "In" }
            ]'

          write_fn "LeadOrchestrator" \
            "RealEstateStar.Functions.Lead.LeadOrchestratorFunction.RunOrchestrator" \
            '[
              { "name": "ctx", "type": "orchestrationTrigger", "direction": "In" }
            ]'

          # ── Activation activity triggers ─────────────────────────────────────────

          write_fn "ActivationCheckComplete" \
            "RealEstateStar.Functions.Activation.Activities.CheckActivationCompleteFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationEmailFetch" \
            "RealEstateStar.Functions.Activation.Activities.EmailFetchFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationDriveIndex" \
            "RealEstateStar.Functions.Activation.Activities.DriveIndexFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationAgentDiscovery" \
            "RealEstateStar.Functions.Activation.Activities.AgentDiscoveryFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationVoiceExtraction" \
            "RealEstateStar.Functions.Activation.Activities.VoiceExtractionFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationPersonality" \
            "RealEstateStar.Functions.Activation.Activities.PersonalityFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationBrandingDiscovery" \
            "RealEstateStar.Functions.Activation.Activities.BrandingDiscoveryFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationCmaStyle" \
            "RealEstateStar.Functions.Activation.Activities.CmaStyleFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationMarketingStyle" \
            "RealEstateStar.Functions.Activation.Activities.MarketingStyleFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationWebsiteStyle" \
            "RealEstateStar.Functions.Activation.Activities.WebsiteStyleFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationPipelineAnalysis" \
            "RealEstateStar.Functions.Activation.Activities.PipelineAnalysisFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationCoaching" \
            "RealEstateStar.Functions.Activation.Activities.CoachingFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationBrandExtraction" \
            "RealEstateStar.Functions.Activation.Activities.BrandExtractionFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationBrandVoice" \
            "RealEstateStar.Functions.Activation.Activities.BrandVoiceFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationComplianceAnalysis" \
            "RealEstateStar.Functions.Activation.Activities.ComplianceAnalysisFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationFeeStructure" \
            "RealEstateStar.Functions.Activation.Activities.FeeStructureFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationContactDetection" \
            "RealEstateStar.Functions.Activation.Activities.ContactDetectionFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationPersistProfile" \
            "RealEstateStar.Functions.Activation.Activities.PersistProfileFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationBrandMerge" \
            "RealEstateStar.Functions.Activation.Activities.BrandMergeFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationContactImport" \
            "RealEstateStar.Functions.Activation.Activities.ContactImportFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ActivationWelcomeNotification" \
            "RealEstateStar.Functions.Activation.Activities.WelcomeNotificationFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          # ── Lead activity triggers ───────────────────────────────────────────────

          write_fn "CheckContentCache" \
            "RealEstateStar.Functions.Lead.Activities.CheckContentCacheFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "CmaProcessing" \
            "RealEstateStar.Functions.Lead.Activities.CmaProcessingFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "DraftLeadEmail" \
            "RealEstateStar.Functions.Lead.Activities.DraftLeadEmailFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "GeneratePdf" \
            "RealEstateStar.Functions.Lead.Activities.GeneratePdfFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "HomeSearch" \
            "RealEstateStar.Functions.Lead.Activities.HomeSearchFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "LoadAgentConfig" \
            "RealEstateStar.Functions.Lead.Activities.LoadAgentConfigFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "NotifyAgent" \
            "RealEstateStar.Functions.Lead.Activities.NotifyAgentFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "PersistLeadResults" \
            "RealEstateStar.Functions.Lead.Activities.PersistLeadResultsFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "ScoreLead" \
            "RealEstateStar.Functions.Lead.Activities.ScoreLeadFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "SendLeadEmail" \
            "RealEstateStar.Functions.Lead.Activities.SendLeadEmailFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          write_fn "UpdateContentCache" \
            "RealEstateStar.Functions.Lead.Activities.UpdateContentCacheFunction.RunAsync" \
            '[{ "name": "input", "type": "activityTrigger", "direction": "In" }]'

          # ── extensions.json — declares the Durable Task extension ────────────────
          # Required by Flex Consumption to load the Durable Functions extension DLL.
          cat > "$OUTDIR/extensions.json" <<JSON
          {
            "extensions": [
              {
                "name": "DurableTask",
                "typeName": "Microsoft.Azure.WebJobs.Extensions.DurableTask.DurableTaskWebJobsStartup, Microsoft.Azure.WebJobs.Extensions.DurableTask, Version=2.0.0.0, Culture=neutral, PublicKeyToken=null",
                "hintPath": "Microsoft.Azure.WebJobs.Extensions.DurableTask.dll"
              }
            ]
          }
          JSON

          echo "Generated $(ls "$OUTDIR" | wc -l) metadata files:"
          ls -la "$OUTDIR"

      - name: Create deployment package
        run: |
          cd ./publish/functions
          zip -r ../../functions.zip . -x '*.pdb'

      - name: Deploy to Azure Functions (Flex Consumption)
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --src functions.zip \
            --timeout 300

      - name: Verify deployment
        run: |
          echo "Checking function app status..."
          az resource show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-type "Microsoft.Web/sites" \
            --query "{state: properties.state, hostName: properties.defaultHostName}" \
            --output table
