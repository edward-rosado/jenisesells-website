name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/RealEstateStar.Functions/**'
      - 'apps/api/RealEstateStar.Domain/**'
      - 'apps/api/RealEstateStar.DataServices/**'
      - 'apps/api/RealEstateStar.Data/**'
      - 'apps/api/RealEstateStar.Workers/**'
      - 'apps/api/RealEstateStar.Services/**'
      - 'apps/api/RealEstateStar.Activities/**'
      - 'apps/api/RealEstateStar.Clients/**'
      - '.github/workflows/deploy-functions.yml'

env:
  FUNCTION_APP_NAME: real-estate-star-functions-v3
  RESOURCE_GROUP: real-estate-star-rg
  FUNCTIONS_PROJECT: apps/api/RealEstateStar.Functions

jobs:
  build-and-test:
    name: "Functions — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ${{ env.FUNCTIONS_PROJECT }}/RealEstateStar.Functions.csproj

      - name: Build
        run: dotnet build ${{ env.FUNCTIONS_PROJECT }}/RealEstateStar.Functions.csproj --no-restore --configuration Release --framework net9.0

      - name: Publish
        run: >
          dotnet publish ${{ env.FUNCTIONS_PROJECT }}/RealEstateStar.Functions.csproj
          --no-build
          --configuration Release
          --output ./publish/functions

      - name: Copy SDK-generated metadata to publish output
        run: |
          OBJ_DIR=${{ env.FUNCTIONS_PROJECT }}/obj/Release/net9.0

          # functions.metadata — generated by Functions SDK source generator; Azure host
          # uses this to discover functions when worker-side indexing is enabled.
          cp "$OBJ_DIR/functions.metadata" ./publish/functions/
          echo "functions.metadata: $(wc -l < ./publish/functions/functions.metadata) lines"

          # worker.config.json — tells the host this is a dotnet-isolated worker and
          # where to find the entry-point DLL.
          cp "$OBJ_DIR/worker.config.json" ./publish/functions/
          echo "worker.config.json: $(cat ./publish/functions/worker.config.json)"

          # host.json — already copied by dotnet publish (it's a content file), verify it exists
          if [ ! -f ./publish/functions/host.json ]; then
            echo "WARNING: host.json missing from publish output, copying from source"
            cp ${{ env.FUNCTIONS_PROJECT }}/host.json ./publish/functions/
          fi

          # WorkerExtensions — host-side extension DLLs (DurableTask, Queues, etc.)
          # Required in .azurefunctions/ for the host to load bindings and start the worker.
          # GitHub Actions drops dot-prefixed dirs, so save as _azurefunctions (underscore).
          EXTENSIONS_DIR=$(find ${{ env.FUNCTIONS_PROJECT }}/obj -path "*/WorkerExtensions/bin/Release/net8.0" -type d | head -1)
          if [ -n "$EXTENSIONS_DIR" ]; then
            mkdir -p ./publish/functions/_azurefunctions
            cp -r "$EXTENSIONS_DIR/." ./publish/functions/_azurefunctions/
            echo "WorkerExtensions: $(ls ./publish/functions/_azurefunctions/*.dll 2>/dev/null | wc -l) DLLs"
            # runtimes/ contains native gRPC binaries needed by the host
            if [ -d "./publish/functions/_azurefunctions/runtimes" ]; then
              echo "runtimes/ present: $(find ./publish/functions/_azurefunctions/runtimes -type f | wc -l) files"
            else
              echo "WARNING: runtimes/ not found in WorkerExtensions"
            fi
            # function.deps.json tells the host how to load extensions
            if [ -f "./publish/functions/_azurefunctions/function.deps.json" ]; then
              echo "function.deps.json: present"
            else
              echo "WARNING: function.deps.json not found in WorkerExtensions"
            fi
          else
            echo "ERROR: WorkerExtensions not found!"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

  deploy:
    name: "Deploy to Azure Functions"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/download-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

      - name: Reconstruct .azurefunctions from _azurefunctions backup
        run: |
          cd ./publish/functions
          # Rename _azurefunctions → .azurefunctions (GitHub Actions drops dot-prefixed dirs)
          if [ -d "_azurefunctions" ]; then
            mv _azurefunctions .azurefunctions
            echo "Restored .azurefunctions/ ($(ls .azurefunctions/*.dll 2>/dev/null | wc -l) DLLs)"
          else
            echo "ERROR: _azurefunctions not found in artifact!"
            exit 1
          fi
          # Verify all critical files are present
          for f in functions.metadata worker.config.json host.json RealEstateStar.Functions.dll; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f" && exit 1
            fi
          done

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy via func CLI
        run: |
          cd ./publish/functions
          # Create local.settings.json required by func CLI
          echo '{"IsEncrypted":false,"Values":{"FUNCTIONS_WORKER_RUNTIME":"dotnet-isolated"}}' > local.settings.json
          # Deploy — func publish uses SCM zipdeploy + trigger sync
          func azure functionapp publish ${{ env.FUNCTION_APP_NAME }} --no-build --dotnet-isolated
          # Remove WEBSITE_RUN_FROM_PACKAGE so the host reads files from wwwroot directly
          az functionapp config appsettings delete \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true
          echo "Removed WEBSITE_RUN_FROM_PACKAGE — host will read from wwwroot"
          # Force restart to pick up the change
          az functionapp restart \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
          echo "App restarted"

      - name: Verify deployment
        run: |
          sleep 30
          echo "Checking function discovery..."
          FUNCS=$(az rest --method get \
            --url "https://management.azure.com/subscriptions/ca48f899-f7bf-4856-bf2a-3618deeaf010/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.FUNCTION_APP_NAME }}/functions?api-version=2023-12-01" \
            --query "value | length(@)" --output tsv 2>/dev/null || echo "0")
          echo "Functions discovered: $FUNCS"
          # Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.FUNCTION_APP_NAME }}.azurewebsites.net/api/health" || echo "000")
          echo "Health endpoint: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Deployment verified successfully!"
          else
            echo "WARNING: Health check returned $HTTP_CODE (may need cold start time)"
          fi
