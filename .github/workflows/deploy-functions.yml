name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/RealEstateStar.Functions/**'
      - 'apps/api/RealEstateStar.Domain/**'
      - 'apps/api/RealEstateStar.DataServices/**'
      - 'apps/api/RealEstateStar.Data/**'
      - 'apps/api/RealEstateStar.Workers/**'
      - 'apps/api/RealEstateStar.Services/**'
      - 'apps/api/RealEstateStar.Activities/**'
      - 'apps/api/RealEstateStar.Clients/**'
      - '.github/workflows/deploy-functions.yml'

env:
  FUNCTION_APP_NAME: real-estate-star-functions-v2
  RESOURCE_GROUP: real-estate-star-rg

jobs:
  build-and-test:
    name: "Functions — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9 + 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj --no-restore --configuration Release --framework net9.0

      - name: Publish
        run: >
          dotnet publish apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj
          --no-build
          --configuration Release
          --framework net9.0
          --output ./publish/functions

      - uses: actions/upload-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

  deploy:
    name: "Deploy to Azure Functions"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/download-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

      - name: Prepare and deploy
        run: |
          set -euo pipefail

          # Generate .azurefunctions from SDK-generated functions.metadata
          mkdir -p ./publish/functions/.azurefunctions
          python3 -c "
          import json, os
          with open('./publish/functions/functions.metadata') as f:
              functions = json.load(f)
          outdir = './publish/functions/.azurefunctions'
          for func in functions:
              with open(os.path.join(outdir, func['name'] + '.json'), 'w') as out:
                  json.dump(func, out, indent=2)
          print(f'Generated {len(functions)} function metadata files')
          "
          echo '{"extensions":[]}' > ./publish/functions/.azurefunctions/extensions.json

          # Zip and deploy
          cd ./publish/functions
          zip -r ../../functions.zip . -x '*.pdb'
          cd ../..
          # Stop app, deploy, start — ensures host reads fresh content
          az functionapp stop --name ${{ env.FUNCTION_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}
          sleep 5

          az functionapp deployment source config-zip \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --src functions.zip \
            --timeout 300

          az functionapp start --name ${{ env.FUNCTION_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}
          sleep 30

          # Check function discovery
          echo "Listing functions..."
          az rest --method get \
            --url "https://management.azure.com/subscriptions/ca48f899-f7bf-4856-bf2a-3618deeaf010/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.FUNCTION_APP_NAME }}/functions?api-version=2023-12-01" \
            --query "value[].{name: properties.name}" --output table || echo "Could not list functions"

      - name: Verify deployment
        run: |
          echo "Checking function app status..."
          az resource show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-type "Microsoft.Web/sites" \
            --query "{state: properties.state, hostName: properties.defaultHostName}" \
            --output table
