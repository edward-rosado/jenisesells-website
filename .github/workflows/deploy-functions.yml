name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/RealEstateStar.Functions/**'
      - 'apps/api/RealEstateStar.Domain/**'
      - 'apps/api/RealEstateStar.DataServices/**'
      - 'apps/api/RealEstateStar.Data/**'
      - 'apps/api/RealEstateStar.Workers/**'
      - 'apps/api/RealEstateStar.Services/**'
      - 'apps/api/RealEstateStar.Activities/**'
      - 'apps/api/RealEstateStar.Clients/**'
      - '.github/workflows/deploy-functions.yml'

env:
  FUNCTION_APP_NAME: real-estate-star-functions-v3
  RESOURCE_GROUP: real-estate-star-rg

jobs:
  build-and-test:
    name: "Functions — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj --no-restore --configuration Release --framework net9.0

      - name: Publish
        run: >
          dotnet publish apps/api/RealEstateStar.Functions/RealEstateStar.Functions.csproj
          --no-build
          --configuration Release
          --output ./publish/functions

      - name: Copy WorkerExtensions to publish output
        run: |
          # The Functions SDK builds host-side extensions (DurableTask, Queues, etc.) during
          # dotnet build into obj/*/WorkerExtensions/bin/. Azure Functions host requires these
          # DLLs in .azurefunctions/ to discover functions and start the worker process.
          #
          # GitHub Actions artifact upload/download drops dot-prefixed directories, so we save
          # extensions to _azurefunctions/ (underscore) and rename to .azurefunctions/ in deploy.
          EXTENSIONS_DIR=$(find apps/api/RealEstateStar.Functions/obj -path "*/WorkerExtensions/bin/Release/net8.0" -type d | head -1)
          echo "WorkerExtensions found at: $EXTENSIONS_DIR"
          mkdir -p ./publish/functions/_azurefunctions
          cp -r "$EXTENSIONS_DIR/." ./publish/functions/_azurefunctions/
          echo "Copied $(ls ./publish/functions/_azurefunctions/*.dll 2>/dev/null | wc -l) extension DLLs"
          ls ./publish/functions/_azurefunctions/ | head -10

      - uses: actions/upload-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

  deploy:
    name: "Deploy to Azure Functions"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/download-artifact@v4
        with:
          name: functions-publish
          path: ./publish/functions

      - name: Reconstruct .azurefunctions from _azurefunctions backup
        run: |
          cd ./publish/functions
          # Rename _azurefunctions → .azurefunctions (GitHub Actions drops dot-prefixed dirs)
          if [ -d "_azurefunctions" ]; then
            mv _azurefunctions .azurefunctions
            echo "Restored .azurefunctions from _azurefunctions backup"
          else
            echo "ERROR: _azurefunctions not found in artifact!"
            exit 1
          fi
          echo "=== .azurefunctions ($(ls .azurefunctions/ | wc -l) files) ==="
          ls .azurefunctions/ | head -10
          echo "=== worker.config.json ==="
          cat worker.config.json
          echo "=== host.json ==="
          cat host.json

      - name: Deploy via config-zip
        run: |
          cd ./publish/functions
          # Create zip with ALL files including .azurefunctions
          zip -r ../../deploy.zip . -x '*.pdb'
          # Verify .azurefunctions is in the zip
          echo "=== .azurefunctions in zip ==="
          unzip -l ../../deploy.zip | grep "\.azurefunctions/" | head -5
          echo "Total DLLs in .azurefunctions:"
          unzip -l ../../deploy.zip | grep "\.azurefunctions/.*\.dll" | wc -l
          # Deploy
          az functionapp deployment source config-zip \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --src ../../deploy.zip \
            --timeout 300

      - name: Verify deployment
        run: |
          sleep 30
          echo "Checking function discovery..."
          az rest --method get \
            --url "https://management.azure.com/subscriptions/ca48f899-f7bf-4856-bf2a-3618deeaf010/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.FUNCTION_APP_NAME }}/functions?api-version=2023-12-01" \
            --query "value[].{name: properties.name}" --output table || echo "Could not list functions yet (may take a minute)"
          echo "---"
          az resource show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-type "Microsoft.Web/sites" \
            --query "{state: properties.state, hostName: properties.defaultHostName}" \
            --output table
