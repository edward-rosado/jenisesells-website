name: API

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, feat/lead-submission-api]

jobs:
  changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'

  build-and-test:
    name: "API — build and test"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Api.sln

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Api.sln --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test apps/api/RealEstateStar.Api.sln
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory apps/api/coverage
          --logger "console;verbosity=minimal"

      - name: Export OpenAPI spec
        run: dotnet run --project apps/api/RealEstateStar.Api -- --export-openapi
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: apps/api/openapi.json
        if: hashFiles('apps/api/openapi.json') != ''

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/**/coverage.cobertura.xml
          retention-days: 7

  skip:
    name: "API — build and test"
    needs: changes
    if: needs.changes.outputs.api != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No API changes detected — skipping build and test."
