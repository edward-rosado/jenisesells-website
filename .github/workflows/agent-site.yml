name: Agent Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - 'config/agents/**'
      - 'packages/**'
      - '.github/workflows/agent-site.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - 'config/agents/**'
      - 'packages/**'
      - '.github/workflows/agent-site.yml'

jobs:
  lint-test-build:
    name: "Agent Site — lint, test, coverage"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if agent-site exists
        id: check
        run: |
          if [ -f "apps/agent-site/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No apps/agent-site/package.json found -- skipping."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Generate config registry
        if: steps.check.outputs.exists == 'true'
        run: node apps/agent-site/scripts/generate-config-registry.mjs

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint --prefix apps/agent-site

      - name: Test with coverage
        if: steps.check.outputs.exists == 'true'
        run: npm run test:coverage --prefix apps/agent-site

      - name: Build Next.js
        if: steps.check.outputs.exists == 'true'
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npm run build --prefix apps/agent-site

      - name: Build for Cloudflare (OpenNext)
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/agent-site
        run: npx opennextjs-cloudflare build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: steps.check.outputs.exists == 'true'
        with:
          name: agent-site-coverage
          path: apps/agent-site/coverage/
          retention-days: 7

      - name: Upload build output for preview deploy
        uses: actions/upload-artifact@v4
        if: steps.check.outputs.exists == 'true' && github.event_name == 'pull_request'
        with:
          name: agent-site-build
          path: apps/agent-site/.open-next/
          retention-days: 1

  preview-deploy:
    name: "Preview Deploy"
    needs: lint-test-build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if agent-site exists
        id: check
        run: |
          if [ -f "apps/agent-site/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download build artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: agent-site-build
          path: apps/agent-site/

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Generate preview wrangler config
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/agent-site
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          PREVIEW_NAME="real-estate-star-agents-pr-${PR_NUM}"
          cat > wrangler.preview.jsonc <<WRANGLER_EOF
          {
            "\$schema": "node_modules/wrangler/config-schema.json",
            "name": "${PREVIEW_NAME}",
            "main": ".open-next/worker.js",
            "compatibility_date": "2026-03-11",
            "compatibility_flags": ["nodejs_compat"],
            "assets": {
              "directory": ".open-next/assets",
              "binding": "ASSETS"
            },
            "services": [
              {
                "binding": "WORKER_SELF_REFERENCE",
                "service": "${PREVIEW_NAME}"
              }
            ],
            "vars": {
              "NEXT_PUBLIC_API_URL": "https://api.real-estate-star.com",
              "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY": "${{ secrets.GOOGLE_MAPS_API_KEY }}"
            }
          }
          WRANGLER_EOF

      - name: Deploy preview to Cloudflare Workers
        if: steps.check.outputs.exists == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/agent-site
          command: deploy --config wrangler.preview.jsonc

      - name: Discover agents for preview links
        if: steps.check.outputs.exists == 'true'
        id: agents
        run: |
          # Find valid agents: directories with config.json OR top-level .json files (skip bad-* test fixtures)
          AGENTS=""
          for dir in config/agents/*/; do
            id=$(basename "$dir")
            if [ -f "$dir/config.json" ]; then
              AGENTS="${AGENTS}${id}\n"
            fi
          done
          for f in config/agents/*.json; do
            id=$(basename "$f" .json)
            # Skip test fixtures (bad-*) and agent.schema.json
            case "$id" in bad-*|agent.schema) continue;; esac
            AGENTS="${AGENTS}${id}\n"
          done
          echo "list<<EOF" >> $GITHUB_OUTPUT
          printf "$AGENTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const baseUrl = `https://real-estate-star-agents-pr-${prNumber}.misteredr.workers.dev`;
            const agentList = `${{ steps.agents.outputs.list }}`.trim().split('\n').filter(Boolean);

            let links = agentList.map(id =>
              `- [${id}](${baseUrl}/?agentId=${id})`
            ).join('\n');

            const body = [
              `**Agent Site Preview**`,
              ``,
              `Default: ${baseUrl}`,
              ``,
              `**Per-agent previews:**`,
              links,
            ].join('\n');

            // Check for existing preview comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('Agent Site Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
