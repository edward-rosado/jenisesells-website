name: Agent Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - 'config/accounts/**'
      - 'packages/**'
      - '.github/workflows/agent-site.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - 'config/accounts/**'
      - 'packages/**'
      - '.github/workflows/agent-site.yml'

jobs:
  lint-test-build:
    name: "Agent Site — lint, test, coverage"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if agent-site exists
        id: check
        run: |
          if [ -f "apps/agent-site/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No apps/agent-site/package.json found -- skipping."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Generate config registry
        if: steps.check.outputs.exists == 'true'
        run: node apps/agent-site/scripts/generate-config-registry.mjs

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint --prefix apps/agent-site

      - name: Test with coverage
        if: steps.check.outputs.exists == 'true'
        run: npm run test:coverage --prefix apps/agent-site

      - name: Build Next.js
        if: steps.check.outputs.exists == 'true'
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npm run build --prefix apps/agent-site

      - name: Build for Cloudflare (OpenNext)
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/agent-site
        run: npx opennextjs-cloudflare build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: steps.check.outputs.exists == 'true'
        with:
          name: agent-site-coverage
          path: apps/agent-site/coverage/
          retention-days: 7

  preview-deploy:
    name: "Preview Deploy"
    needs: lint-test-build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if agent-site exists
        id: check
        run: |
          if [ -f "apps/agent-site/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Generate config registry
        if: steps.check.outputs.exists == 'true'
        run: node apps/agent-site/scripts/generate-config-registry.mjs

      - name: Build Next.js
        if: steps.check.outputs.exists == 'true'
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npm run build --prefix apps/agent-site

      - name: Build for Cloudflare (OpenNext)
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/agent-site
        run: npx opennextjs-cloudflare build

      - name: Generate preview wrangler config
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/agent-site
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          PREVIEW_NAME="real-estate-star-agents-pr-${PR_NUM}"
          cat > wrangler.preview.jsonc <<WRANGLER_EOF
          {
            "\$schema": "node_modules/wrangler/config-schema.json",
            "name": "${PREVIEW_NAME}",
            "main": ".open-next/worker.js",
            "compatibility_date": "2026-03-11",
            "compatibility_flags": ["nodejs_compat"],
            "assets": {
              "directory": ".open-next/assets",
              "binding": "ASSETS"
            },
            "services": [
              {
                "binding": "WORKER_SELF_REFERENCE",
                "service": "${PREVIEW_NAME}"
              }
            ],
            "vars": {
              "NEXT_PUBLIC_API_URL": "https://api.real-estate-star.com",
              "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY": "${{ secrets.GOOGLE_MAPS_API_KEY }}",
              "PREVIEW": "true"
            }
          }
          WRANGLER_EOF

      - name: Deploy preview to Cloudflare Workers
        if: steps.check.outputs.exists == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/agent-site
          command: deploy --config wrangler.preview.jsonc

      - name: Discover agents for preview links
        if: steps.check.outputs.exists == 'true'
        id: agents
        run: |
          # Build JSON array of agent metadata for the PR comment
          AGENTS_JSON="["
          first=true

          for dir in config/accounts/*/; do
            id=$(basename "$dir")
            if [ -f "$dir/account.json" ]; then
              template=$(jq -r '.template // "emerald-classic"' "$dir/account.json" 2>/dev/null || echo "emerald-classic")
              primary=$(jq -r '.branding.primary_color // ""' "$dir/account.json" 2>/dev/null || echo "")
              accent=$(jq -r '.branding.accent_color // ""' "$dir/account.json" 2>/dev/null || echo "")
              font=$(jq -r '.branding.font_family // ""' "$dir/account.json" 2>/dev/null || echo "")
              name=$(jq -r '.agent.name // .broker.name // .brokerage.name // ""' "$dir/account.json" 2>/dev/null || echo "")
              [ "$first" = true ] && first=false || AGENTS_JSON="${AGENTS_JSON},"
              AGENTS_JSON="${AGENTS_JSON}{\"id\":\"${id}\",\"name\":\"${name}\",\"template\":\"${template}\",\"primary\":\"${primary}\",\"accent\":\"${accent}\",\"font\":\"${font}\"}"
            fi
          done

          AGENTS_JSON="${AGENTS_JSON}]"
          echo "json<<EOF" >> $GITHUB_OUTPUT
          echo "$AGENTS_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const baseUrl = `https://real-estate-star-agents-pr-${prNumber}.misteredr.workers.dev`;
            const agents = JSON.parse(`${{ steps.agents.outputs.json }}`);

            const rows = agents.map(a => {
              const link = `[${a.name || a.id}](${baseUrl}/?accountId=${a.id})`;
              const colors = [a.primary, a.accent].filter(Boolean).map(c => `\`${c}\``).join(' / ') || '—';
              return `| ${link} | ${a.template} | ${colors} | ${a.font || '—'} |`;
            }).join('\n');

            const body = [
              `**🏠 Agent Site Preview**`,
              ``,
              `Default: ${baseUrl}`,
              ``,
              `| Agent | Template | Colors | Font |`,
              `|-------|----------|--------|------|`,
              rows,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('Agent Site Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
