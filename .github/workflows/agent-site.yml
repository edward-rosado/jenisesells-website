name: Agent Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - 'config/agents/**'
      - 'packages/**'
      - '.github/workflows/agent-site.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/agent-site/**'
      - 'config/agents/**'
      - 'packages/**'
      - '.github/workflows/agent-site.yml'

jobs:
  lint-test-build:
    name: "Agent Site -- lint, test, build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if agent-site exists
        id: check
        run: |
          if [ -f "apps/agent-site/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No apps/agent-site/package.json found -- skipping."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Generate config registry
        if: steps.check.outputs.exists == 'true'
        run: node apps/agent-site/scripts/generate-config-registry.mjs

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint --prefix apps/agent-site

      - name: Test with coverage
        if: steps.check.outputs.exists == 'true'
        run: npm run test:coverage --prefix apps/agent-site

      - name: Build Next.js
        if: steps.check.outputs.exists == 'true'
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npm run build --prefix apps/agent-site

      - name: Build for Cloudflare (OpenNext)
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/agent-site
        run: npx opennextjs-cloudflare build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: steps.check.outputs.exists == 'true'
        with:
          name: agent-site-coverage
          path: apps/agent-site/coverage/
          retention-days: 7

  preview-deploy:
    name: "Preview Deploy"
    needs: lint-test-build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if agent-site exists
        id: check
        run: |
          if [ -f "apps/agent-site/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Build Next.js
        if: steps.check.outputs.exists == 'true'
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npm run build --prefix apps/agent-site

      - name: Build for Cloudflare (OpenNext)
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/agent-site
        run: npx opennextjs-cloudflare build

      - name: Deploy preview to Cloudflare Pages
        if: steps.check.outputs.exists == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/agent-site
          command: pages deploy .open-next/assets --project-name=real-estate-star-agents --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        if: steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://pr-${prNumber}.real-estate-star-agents.pages.dev`;
            const body = `**Agent Site Preview:** ${previewUrl}\n\nThis preview will be available once the Cloudflare Pages project \`real-estate-star-agents\` is created.`;

            // Check for existing preview comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('Agent Site Preview:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
