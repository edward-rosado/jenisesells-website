name: Deploy Platform

on:
  push:
    branches: [main]
    paths:
      - 'apps/platform/**'
      - 'packages/domain/**'
      - 'packages/forms/**'
      - 'packages/legal/**'
      - 'packages/analytics/**'
      - 'packages/api-client/**'
      - '.github/workflows/deploy-platform.yml'

jobs:
  test:
    name: "Platform -- lint, test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate architecture
        run: node scripts/validate-architecture.mjs

      - name: Lint
        run: npm run lint --prefix apps/platform

      - name: Test
        run: npm run test:coverage --prefix apps/platform

  deploy:
    name: "Build & Deploy to Cloudflare Workers"
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Stripe key type
        run: |
          KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}"
          if [ -n "$KEY" ] && [[ "$KEY" != pk_* ]]; then
            echo "ERROR: STRIPE_PUBLISHABLE_KEY does not start with pk_"
            exit 1
          fi

      - name: Build with OpenNext
        working-directory: apps/platform
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_STRIPE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_COMING_SOON: "true"
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/platform
          command: deploy
