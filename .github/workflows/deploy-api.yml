name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: edward-rosado
  CONTAINER_APP_NAME: real-estate-star-api
  RESOURCE_GROUP: real-estate-star-rg
  IMAGE_NAME: real-estate-star-api

jobs:
  test:
    name: "API — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Api.sln

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Api.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test apps/api/RealEstateStar.Api.sln
          --no-build
          --configuration Release
          --logger "console;verbosity=minimal"

      - name: Export OpenAPI spec
        run: dotnet run --project apps/api/RealEstateStar.Api -- --export-openapi
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: apps/api/openapi.json
        if: hashFiles('apps/api/openapi.json') != ''

  deploy:
    name: "Deploy to Azure Container Apps"
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Copy config into Docker context
        run: cp -r config/accounts apps/api/config-accounts

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f apps/api/Dockerfile \
            apps/api

      - name: Push image to GHCR
        run: docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Container App secrets
        env:
          WA_PHONE: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WA_VERIFY: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          WA_WABA: ${{ secrets.WHATSAPP_WABA_ID }}
          AZ_STORAGE: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          HMAC_SECRET: ${{ secrets.LEAD_HMAC_SECRET }}
          HMAC_API_KEY: ${{ secrets.LEAD_API_KEY }}
          RENTCAST_KEY: ${{ secrets.RENTCAST_API_KEY }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          SECRETS=()
          [ -n "$WA_PHONE" ]      && SECRETS+=("whatsapp-phone-number-id=$WA_PHONE")
          [ -n "$WA_TOKEN" ]      && SECRETS+=("whatsapp-access-token=$WA_TOKEN")
          [ -n "$WA_SECRET" ]     && SECRETS+=("whatsapp-app-secret=$WA_SECRET")
          [ -n "$WA_VERIFY" ]     && SECRETS+=("whatsapp-verify-token=$WA_VERIFY")
          [ -n "$WA_WABA" ]       && SECRETS+=("whatsapp-waba-id=$WA_WABA")
          [ -n "$AZ_STORAGE" ]    && SECRETS+=("azure-storage-connection-string=$AZ_STORAGE")
          [ -n "$HMAC_SECRET" ]   && SECRETS+=("hmac-secret=$HMAC_SECRET")
          [ -n "$HMAC_API_KEY" ]  && SECRETS+=("hmac-api-key=$HMAC_API_KEY")
          [ -n "$RENTCAST_KEY" ]  && SECRETS+=("rentcast-api-key=$RENTCAST_KEY")
          [ -n "$TURNSTILE_SECRET" ] && SECRETS+=("turnstile-secret-key=$TURNSTILE_SECRET")
          if [ ${#SECRETS[@]} -gt 0 ]; then
            az containerapp secret set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --secrets "${SECRETS[@]}"
          else
            echo "No secrets configured — skipping secret update"
          fi

      - name: Deploy to Container App
        env:
          WA_PHONE: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          AZ_STORAGE: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          HMAC_SECRET: ${{ secrets.LEAD_HMAC_SECRET }}
          HMAC_API_KEY: ${{ secrets.LEAD_API_KEY }}
          OTEL_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          RENTCAST_KEY: ${{ secrets.RENTCAST_API_KEY }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          # Always set Functions health URL so it stays in sync with deploy-functions.yml
          EXTRA_ENV_VARS="AzureFunctions__HealthUrl=https://real-estate-star-functions-v3.azurewebsites.net/api/health"
          if [ -n "$OTEL_ENDPOINT" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS Otel__Endpoint=$OTEL_ENDPOINT"
          fi
          if [ -n "$WA_PHONE" ]; then
            EXTRA_ENV_VARS="WhatsApp__PhoneNumberId=secretref:whatsapp-phone-number-id WhatsApp__AccessToken=secretref:whatsapp-access-token WhatsApp__AppSecret=secretref:whatsapp-app-secret WhatsApp__VerifyToken=secretref:whatsapp-verify-token WhatsApp__WabaId=secretref:whatsapp-waba-id"
          fi
          if [ -n "$AZ_STORAGE" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS AzureStorage__ConnectionString=secretref:azure-storage-connection-string"
          fi
          if [ -n "$HMAC_SECRET" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS Hmac__HmacSecret=secretref:hmac-secret"
            # ApiKeys maps API key → agent handle; key contains the secret API key value
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS Hmac__ApiKeys__${HMAC_API_KEY}=jenise-buckalew"
          fi
          if [ -n "$RENTCAST_KEY" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS RentCast__ApiKey=secretref:rentcast-api-key"
          fi
          if [ -n "$TURNSTILE_SECRET" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS Turnstile__SecretKey=secretref:turnstile-secret-key"
          fi
          az containerapp registry set \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --server "${{ env.REGISTRY }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GHCR_PAT }}"

          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/$IMAGE_NAME:${{ github.sha }}" \
            ${EXTRA_ENV_VARS:+--set-env-vars $EXTRA_ENV_VARS}

          # Set OTel headers separately — value contains spaces that get mangled in EXTRA_ENV_VARS
          if [ -n "$OTEL_HEADERS" ]; then
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars "Otel__Headers=$OTEL_HEADERS"
          fi

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "Deployed URL: https://${FQDN}"

          # Phase 1: Wait for container to be alive
          echo "--- Phase 1: Liveness check ---"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/health/live" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Liveness check passed"
              break
            fi
            echo "Attempt $i/30: liveness returned $STATUS, retrying in 10s..."
            sleep 10
            if [ "$i" = "30" ]; then
              echo "Liveness check failed after 30 attempts"
              exit 1
            fi
          done

          # Phase 2: Check readiness (includes OTLP, Claude API, etc.)
          echo "--- Phase 2: Readiness check ---"
          READY_RESPONSE=$(curl -s "https://${FQDN}/health/ready" || true)
          READY_STATUS=$(echo "$READY_RESPONSE" | jq -r '.status // "unknown"' 2>/dev/null || echo "parse_error")
          echo "Readiness response: $READY_RESPONSE"

          if [ "$READY_STATUS" = "Unhealthy" ]; then
            echo "::error::Readiness check UNHEALTHY — critical dependencies are broken"
            # Extract which checks failed
            echo "$READY_RESPONSE" | jq -r '.entries | to_entries[] | select(.value.status == "Unhealthy") | "  UNHEALTHY: \(.key) — \(.value.description)"' 2>/dev/null || true
            exit 1
          fi

          if [ "$READY_STATUS" = "Degraded" ]; then
            echo "::warning::Readiness check DEGRADED — some dependencies need attention"
            echo "$READY_RESPONSE" | jq -r '.entries | to_entries[] | select(.value.status == "Degraded") | "  DEGRADED: \(.key) — \(.value.description)"' 2>/dev/null || true
            # Degraded = deploy succeeds but with warning
          fi

          echo "Deployment verified: $READY_STATUS"

      - name: Rollback on failure
        if: failure()
        run: |
          PREV_REVISION=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[1].name" -o tsv)
          if [ -n "$PREV_REVISION" ]; then
            echo "Rolling back to previous revision: $PREV_REVISION"
            az containerapp ingress traffic set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision-weight "$PREV_REVISION=100"
          fi
