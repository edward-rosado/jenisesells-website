name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'

env:
  ACR_NAME: realestatestar
  CONTAINER_APP_NAME: real-estate-star-api
  RESOURCE_GROUP: real-estate-star-rg
  IMAGE_NAME: real-estate-star-api

jobs:
  test:
    name: "API — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Api.sln

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Api.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test apps/api/RealEstateStar.Api.sln
          --no-build
          --configuration Release
          --logger "console;verbosity=minimal"

      - name: Export OpenAPI spec
        run: dotnet run --project apps/api/RealEstateStar.Api -- --export-openapi
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: apps/api/openapi.json
        if: hashFiles('apps/api/openapi.json') != ''

  deploy:
    name: "Deploy to Azure Container Apps"
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Copy config into Docker context
        run: cp -r config/accounts apps/api/config-accounts

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f apps/api/Dockerfile \
            apps/api

      - name: Push image to ACR
        run: docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Container App secrets
        env:
          WA_PHONE: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WA_VERIFY: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          WA_WABA: ${{ secrets.WHATSAPP_WABA_ID }}
          AZ_STORAGE: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          HMAC_SECRET: ${{ secrets.LEAD_HMAC_SECRET }}
          HMAC_API_KEY: ${{ secrets.LEAD_API_KEY }}
        run: |
          SECRETS=()
          [ -n "$WA_PHONE" ]     && SECRETS+=("whatsapp-phone-number-id=$WA_PHONE")
          [ -n "$WA_TOKEN" ]     && SECRETS+=("whatsapp-access-token=$WA_TOKEN")
          [ -n "$WA_SECRET" ]    && SECRETS+=("whatsapp-app-secret=$WA_SECRET")
          [ -n "$WA_VERIFY" ]    && SECRETS+=("whatsapp-verify-token=$WA_VERIFY")
          [ -n "$WA_WABA" ]      && SECRETS+=("whatsapp-waba-id=$WA_WABA")
          [ -n "$AZ_STORAGE" ]   && SECRETS+=("azure-storage-connection-string=$AZ_STORAGE")
          [ -n "$HMAC_SECRET" ]  && SECRETS+=("hmac-secret=$HMAC_SECRET")
          [ -n "$HMAC_API_KEY" ] && SECRETS+=("hmac-api-key=$HMAC_API_KEY")
          if [ ${#SECRETS[@]} -gt 0 ]; then
            az containerapp secret set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --secrets "${SECRETS[@]}"
          else
            echo "No secrets configured — skipping secret update"
          fi

      - name: Deploy to Container App
        env:
          WA_PHONE: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          AZ_STORAGE: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          HMAC_SECRET: ${{ secrets.LEAD_HMAC_SECRET }}
          HMAC_API_KEY: ${{ secrets.LEAD_API_KEY }}
          OTEL_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        run: |
          EXTRA_ENV_VARS=""
          if [ -n "$OTEL_ENDPOINT" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS Otel__Endpoint=$OTEL_ENDPOINT Otel__Headers=$OTEL_HEADERS"
          fi
          if [ -n "$WA_PHONE" ]; then
            EXTRA_ENV_VARS="WhatsApp__PhoneNumberId=secretref:whatsapp-phone-number-id WhatsApp__AccessToken=secretref:whatsapp-access-token WhatsApp__AppSecret=secretref:whatsapp-app-secret WhatsApp__VerifyToken=secretref:whatsapp-verify-token WhatsApp__WabaId=secretref:whatsapp-waba-id"
          fi
          if [ -n "$AZ_STORAGE" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS AzureStorage__ConnectionString=secretref:azure-storage-connection-string"
          fi
          if [ -n "$HMAC_SECRET" ]; then
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS Hmac__HmacSecret=secretref:hmac-secret"
            # ApiKeys maps API key → agent handle; key contains the secret API key value
            EXTRA_ENV_VARS="$EXTRA_ENV_VARS Hmac__ApiKeys__${HMAC_API_KEY}=jenise-buckalew"
          fi
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}" \
            ${EXTRA_ENV_VARS:+--set-env-vars $EXTRA_ENV_VARS}

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "Deployed URL: https://${FQDN}"

          # Wait for the new revision to become ready
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/health/live" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30: health check returned $STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Health check failed after 30 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV_REVISION=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[1].name" -o tsv)
          if [ -n "$PREV_REVISION" ]; then
            echo "Rolling back to previous revision: $PREV_REVISION"
            az containerapp ingress traffic set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision-weight "$PREV_REVISION=100"
          fi
