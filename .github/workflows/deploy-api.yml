name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'

env:
  ACR_NAME: realestatestar
  CONTAINER_APP_NAME: real-estate-star-api
  RESOURCE_GROUP: real-estate-star-rg
  IMAGE_NAME: real-estate-star-api

jobs:
  test:
    name: "API — build and test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Api.sln

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Api.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test apps/api/RealEstateStar.Api.sln
          --no-build
          --configuration Release
          --logger "console;verbosity=minimal"

  deploy:
    name: "Deploy to Azure Container Apps"
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f apps/api/Dockerfile \
            apps/api

      - name: Push image to ACR
        run: docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "Deployed URL: https://${FQDN}"

          # Wait for the new revision to become ready
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/health/live" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30: health check returned $STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Health check failed after 30 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV_REVISION=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[1].name" -o tsv)
          if [ -n "$PREV_REVISION" ]; then
            echo "Rolling back to previous revision: $PREV_REVISION"
            az containerapp ingress traffic set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision-weight "$PREV_REVISION=100"
          fi
