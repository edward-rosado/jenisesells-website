name: api-client

on:
  workflow_run:
    workflows: [API]
    types: [completed]
    branches: [main]
  push:
    paths:
      - 'packages/api-client/**'

jobs:
  generate:
    if: "github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.API_CLIENT_PAT }}

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - run: npm ci --workspace=packages/api-client

      - name: Download OpenAPI spec from API build
        if: "github.event_name == 'workflow_run'"
        id: download
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: packages/api-client/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Check if spec is available
        id: check-spec
        run: |
          if [ -f packages/api-client/openapi.json ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No openapi.json found — skipping type generation."
          fi

      - name: Generate TypeScript types
        if: "steps.check-spec.outputs.available == 'true'"
        run: npm run generate:ci --workspace=packages/api-client

      - name: Commit generated types
        if: "steps.check-spec.outputs.available == 'true'"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/api-client/generated/
          git diff --cached --quiet || git commit -m "chore: regenerate api-client types from OpenAPI spec"
          git push
