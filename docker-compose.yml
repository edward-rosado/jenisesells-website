version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: realestatestar-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      - Anthropic:ApiKey=${ANTHROPIC_API_KEY}
      - Attom:ApiKey=${ATTOM_API_KEY}
      - Google:ClientId=${GOOGLE_CLIENT_ID}
      - Google:ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Google:RedirectUri=${GOOGLE_REDIRECT_URI}
      - Stripe:SecretKey=${STRIPE_SECRET_KEY}
      - Stripe:WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - Stripe:PriceId=${STRIPE_PRICE_ID}
      - Platform:BaseUrl=${PLATFORM_BASE_URL}
      - Cloudflare:ApiToken=${CLOUDFLARE_API_TOKEN:-}
      - Cloudflare:AccountId=${CLOUDFLARE_ACCOUNT_ID:-}
      - ScraperApi:ApiKey=${SCRAPER_API_KEY:-}
      - Cors:AllowedOrigins:0=${CORS_ORIGIN_1:-http://localhost:3000}
      - Cors:AllowedOrigins:1=${CORS_ORIGIN_2:-http://localhost:3001}
    env_file:
      - .env
    volumes:
      - ./apps/api/RealEstateStar.Api:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - realestatestar

networks:
  realestatestar:
    driver: bridge
